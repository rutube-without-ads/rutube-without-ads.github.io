version: "3.9"

networks:
  network:
    driver: bridge

services:
  caddy:
    image: caddy:latest
    container_name: aq_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./:/usr/share/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - network

volumes:
  caddy_data:
  caddy_config:
